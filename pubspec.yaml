name: eps_payment_gateway
description: EPS payment gateway for Flutter. Supports HMAC-SHA512 signing, JWT auth, and live/sandbox modes with WebView payment flow.
version: 1.0.1
homepage: https://github.com/Pritom-Chaki/eps_payment_gateway
repository: https://github.com/Pritom-Chaki/eps_payment_gateway
issue_tracker: https://github.com/Pritom-Chaki/eps_payment_gateway/issues
topics:
  - payment
  - payment-gateway
  - eps
  - bangladesh
  - fintech

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  crypto: ^3.0.3
  http: ^1.2.0
  webview_flutter: ^4.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
